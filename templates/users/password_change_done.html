{% extends "dashboard/base_dashboard.html" %}

{% block title %}Password Updated{% endblock %}

{% block dashboard_content %}
<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 text-center">
                <div class="card-body p-5">
                    <i class="bi bi-shield-check text-success display-4 mb-3"></i>
                    <h4 class="fw-bold text-success">Password Changed Successfully</h4>
                    <p class="text-muted mt-2">
                        Your account password has been updated. You can continue using your account securely.
                    </p>
                    <a href="{% url 'users:profile' %}" class="btn btn-outline-primary mt-4">
                        <i class="bi bi-person-circle me-2"></i>Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
